<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#bf8b6c"/>
      <stop offset="55%" stop-color="#9c6b4f"/>
      <stop offset="100%" stop-color="#3a2418"/>
    </linearGradient>
    <radialGradient id="moon" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbf5e7" stop-opacity="0.97"/>
      <stop offset="80%" stop-color="#f3e7cd" stop-opacity="0.88"/>
      <stop offset="100%" stop-color="#f3e7cd" stop-opacity="0.7"/>
    </radialGradient>
  </defs>
  <rect width="600" height="800" fill="url(#bg)"/>

  <!-- decorative concentric rings -->
  <circle cx="300" cy="320" r="280" fill="none" stroke="#fbf5e7" stroke-opacity="0.05" stroke-width="1"/>
  <circle cx="300" cy="320" r="220" fill="none" stroke="#fbf5e7" stroke-opacity="0.07" stroke-width="1"/>
  <circle cx="300" cy="320" r="160" fill="none" stroke="#fbf5e7" stroke-opacity="0.09" stroke-width="1"/>

  <!-- crescent moon -->
  <circle cx="290" cy="320" r="105" fill="url(#moon)"/>
  <circle cx="322" cy="306" r="105" fill="url(#bg)"/>

  <!-- wordmark -->
  <text x="300" y="510" font-family="Georgia, 'Times New Roman', serif" font-size="46" fill="#fbf5e7" text-anchor="middle" font-weight="500" letter-spacing="1.2">African Goddess</text>
  <text x="300" y="540" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#fbf5e7" fill-opacity="0.85" text-anchor="middle" font-style="italic" letter-spacing="4.5">CURATED  ·  ENERGETICALLY  CONSCIOUS</text>

  <!-- tagline -->
  <text x="300" y="700" font-family="Georgia, 'Times New Roman', serif" font-size="15" fill="#fbf5e7" fill-opacity="0.72" text-anchor="middle" font-style="italic">"Sacred Tools For Sacred Times"</text>
</svg>
